{% extends "base.html" %}
{% block content %}
<header class="page-head"><div><span class="eyebrow">File Upload Module</span><h1>Register a file baseline</h1></div></header>
<section class="panel">
    <form method="post" enctype="multipart/form-data" class="upload-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="drop-zone" id="dropZone">
            <input type="file" name="file" id="fileInput" required>
            <span class="drop-icon">+</span>
            <strong>Drop a file here or browse</strong>
            <small>PDF, DOCX, TXT, ZIP, images, spreadsheets, source files up to 25 MB</small>
        </label>
        <div class="progress"><span id="progressBar"></span></div>
        <button class="primary" type="submit">Generate Poly1305 MAC</button>
    </form>
</section>
{% endblock %}
